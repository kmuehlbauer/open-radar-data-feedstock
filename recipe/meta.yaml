{% set name = "open-radar-data" %}
{% set version = "0.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: c5f52fab028fb731f866e2ff7ea405c1664ca1a6785e57edb46bdfbba3acd3f6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=45
    - wheel
    - setuptools-scm >=7.0
    - pip
  run:
    - python >={{ python_min }}
    - pooch

test:
  imports:
    - open_radar_data
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/openradar/open-radar-data
  summary: Provides utility functions for accessing data repository for Project Pythia examples/notebooks
  dev_url: https://github.com/openradar/open-radar-data
  license: MIT
  license_file: LICENSE
  description: A place to share radar data with the community, shared between the open radar package

extra:
  recipe-maintainers:
    - HeavyTony2
    - mgrover1
    - kmuehlbauer
